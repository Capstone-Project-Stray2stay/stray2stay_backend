host: localhost:3000
info:
  contact: {}
  description: API for pet adoption platform
  title: Pet Adoption API
  version: "1.0"
paths:
  /api/pet/{pid}:
    get:
      description: Retrieve pet by ID
      parameters:
      - description: Pet ID
        in: path
        name: pid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetGetInfoByIdResponse'
      summary: Get pet info
      tags:
      - pets
  /api/pet/adopt:
    post:
      consumes:
      - application/json
      description: Submit an adoption questionnaire form for a specific pet (requires
        authentication)
      parameters:
      - description: Adoption Form Payload
        in: body
        name: adoption
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetAdoptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetAdoptResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit adoption request
      tags:
      - pets
  /api/pet/adopt/select:
    patch:
      consumes:
      - application/json
      description: Accept a pending adoption request, marking the pet as adopted and
        denying all other requests
      parameters:
      - description: Select Adopter Payload
        in: body
        name: adopter
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetSelectAdopterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetSelectAdopterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
      summary: Select an adopter
      tags:
      - pets
  /api/pet/ai/classify:
    post:
      consumes:
      - multipart/form-data
      description: Upload 1–2 pet images to detect the breed via an external AI service
      parameters:
      - description: Pet type (e.g. CAT, DOG)
        in: query
        name: type
        required: true
        type: string
      - description: Pet image(s) — 1 or 2 files
        in: formData
        name: images
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetAIClassifyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
      summary: Classify pet breed using AI
      tags:
      - pets
  /api/pet/all:
    get:
      description: Retrieve all pets
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetSearchFilterResponse'
      summary: Get all pets
      tags:
      - pets
  /api/pet/random:
    get:
      consumes:
      - application/json
      description: Get a random selection of available cats and dogs for adoption
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetsInfoResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.ErrorResponse'
      summary: Get random pet suggestions
      tags:
      - pets
  /api/pet/register:
    post:
      consumes:
      - application/json
      description: Register a new pet
      parameters:
      - description: Pet Payload
        in: body
        name: pet
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.PetRegisterResponse'
      summary: Register pet
      tags:
      - pets
  /api/user/delete:
    delete:
      description: Delete authenticated user
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserDeleteResponse'
      summary: Delete user
      tags:
      - users
  /api/user/info:
    get:
      description: Get authenticated user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserInfoResponse'
      summary: Get user info
      tags:
      - users
  /api/user/login:
    post:
      consumes:
      - application/json
      description: Login using email and password
      parameters:
      - description: Login Payload
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserLoginResponse'
      summary: Login user
      tags:
      - users
  /api/user/oauth/{provider}:
    get:
      description: Redirect user to OAuth provider
      parameters:
      - description: OAuth Provider
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Found
          schema:
            type: string
      summary: Start OAuth login
      tags:
      - users
  /api/user/oauth/{provider}/callback:
    get:
      description: Handle OAuth provider callback
      parameters:
      - description: OAuth Provider
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Found
          schema:
            type: string
      summary: OAuth callback
      tags:
      - users
  /api/user/register:
    post:
      consumes:
      - application/json
      description: Create new user account
      parameters:
      - description: Register Payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserRegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserRegisterResponse'
      summary: Register user
      tags:
      - users
  /api/user/update:
    put:
      consumes:
      - application/json
      description: Update authenticated user's profile
      parameters:
      - description: Update Payload
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_S-nudhana_stray2stay_internal_core_domain.UserUpdateResponse'
      summary: Update user
      tags:
      - users
swagger: "2.0"
